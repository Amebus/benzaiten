services:
  postgres:
    image: postgres:16-alpine
    container_name: benzaiten-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    networks:
      - benzaiten-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: benzaiten-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - benzaiten-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: benzaiten-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    networks:
      - benzaiten-dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  adminer:
    image: adminer:latest
    container_name: benzaiten-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8081:8080"
    networks:
      - benzaiten-dev

  ui-dev:
    build:
      context: .
      dockerfile: src/UI/.devcontainer/Dockerfile
    container_name: benzaiten-ui-dev
    volumes:
      - ./:/workspace:cached
      - ui-node-modules:/workspace/src/UI/node_modules
    ports:
      - "3000:3000"
    networks:
      - benzaiten-dev
    command: sleep infinity
    depends_on:
      - bff-dev

  bff-dev:
    build:
      context: .
      dockerfile: src/BFF/.devcontainer/Dockerfile
    container_name: benzaiten-bff-dev
    volumes:
      - ./:/workspace:cached
      - bff-node-modules:/workspace/src/BFF/node_modules
    ports:
      - "4000:4000"
    networks:
      - benzaiten-dev
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started

  backend-dev:
    build:
      context: .
      dockerfile: src/Backend/.devcontainer/Dockerfile
    container_name: benzaiten-backend-dev
    volumes:
      - ./:/workspace:cached
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/src/Backend/target
    ports:
      - "8000:8000"
    networks:
      - benzaiten-dev
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  benzaiten-dev:
    driver: bridge
    name: benzaiten-dev

volumes:
  postgres-data:
  redis-data:
  ui-node-modules:
  bff-node-modules:
  cargo-cache:
  target-cache:
