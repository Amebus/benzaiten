services:
  traefik:
    image: traefik:v3.0
    container_name: benzaiten-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=benzaiten-dev"
      - "--entrypoints.web.address=:80"
    ports:
      - "50080:80"
      - "50088:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - benzaiten-dev

  postgres:
    image: postgres:18.3-alpine
    container_name: benzaiten-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES}
    ports:
      - "25432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    networks:
      - benzaiten-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: benzaiten-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "26379:6379"
    volumes:
      - redis-data:/data
    networks:
      - benzaiten-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: benzaiten-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "58080:8080"
    networks:
      - benzaiten-dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Keycloak 26+ exposes /health/ready on the management port 9000 (internal),
      # not on the main HTTP port 8080.
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  adminer:
    image: adminer:latest
    container_name: benzaiten-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "58081:8080"
    networks:
      - benzaiten-dev

  ui-dev:
    build:
      context: .
      dockerfile: src/UI/.devcontainer/Dockerfile
    container_name: benzaiten-ui-dev
    volumes:
      - ./:/workspace:cached
      - ui-node-modules:/workspace/src/UI/node_modules
    ports:
      - "53000:3000"
    networks:
      - benzaiten-dev
    command: sleep infinity
    depends_on:
      - bff-dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui.rule=PathPrefix(`/`)"
      - "traefik.http.routers.ui.priority=1"
      - "traefik.http.services.ui.loadbalancer.server.port=3000"

  bff-dev:
    build:
      context: .
      dockerfile: src/BFF/.devcontainer/Dockerfile
    container_name: benzaiten-bff-dev
    volumes:
      - ./:/workspace:cached
      - bff-node-modules:/workspace/src/BFF/node_modules
    ports:
      - "54000:4000"
    networks:
      - benzaiten-dev
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bff.rule=PathPrefix(`/bff`)"
      - "traefik.http.routers.bff.priority=10"
      - "traefik.http.services.bff.loadbalancer.server.port=4000"
      - "traefik.http.middlewares.bff-strip.stripprefix.prefixes=/bff"
      - "traefik.http.routers.bff.middlewares=bff-strip"

  backend-dev:
    build:
      context: .
      dockerfile: src/Backend/.devcontainer/Dockerfile
    container_name: benzaiten-backend-dev
    volumes:
      - ./:/workspace:cached
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/src/Backend/target
    ports:
      - "58000:8000"
    networks:
      - benzaiten-dev
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.backend.middlewares=api-strip"

networks:
  benzaiten-dev:
    driver: bridge
    name: benzaiten-dev

volumes:
  postgres-data:
  redis-data:
  ui-node-modules:
  bff-node-modules:
  cargo-cache:
  target-cache:
