version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: benzaiten-postgres
    environment:
      POSTGRES_DB: benzaiten
      POSTGRES_USER: benzaiten
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - benzaiten-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benzaiten"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: benzaiten-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - benzaiten-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: benzaiten-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/benzaiten
      KC_DB_USERNAME: benzaiten
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
    command: start-dev
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - benzaiten-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: benzaiten-backend
    environment:
      DATABASE_URL: postgres://benzaiten:${POSTGRES_PASSWORD}@postgres:5432/benzaiten
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: benzaiten
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: benzaiten
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      RUST_LOG: info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - benzaiten-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: benzaiten-frontend
    environment:
      BACKEND_API_URL: http://backend:8080
      KEYCLOAK_URL: http://localhost:8180
      KEYCLOAK_REALM: benzaiten
      KEYCLOAK_CLIENT_ID: benzaiten-web
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - benzaiten-network

volumes:
  postgres_data:
  minio_data:

networks:
  benzaiten-network:
    driver: bridge
